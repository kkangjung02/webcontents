<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>색 테이블 만들기</title>
        <style>
            #brown {background-color: brown; width: 50px; height: 20px;}
            #Blueviolet {background-color: blueviolet; width: 50px; height: 20px;}
            #DarkOrange {background-color: darkorange; width: 50px; height: 20px;}
            #DeepSky {background-color: deepskyblue; width: 50px; height: 20px;}
            #Gold {background-color: gold; width: 50px; height: 20px;}
            #OliveDrab {background-color: olivedrab; width: 50px; height: 20px;}


        </style>
    </head>
    <body>
        <h3>색 이름과 코드</h3>
        <hr>
        <table border="1">
            <thead>
                <tr><td>이름</td><td>코드</td><td>색</td><td>이름</td><td>코드</td><td>색</td></tr>
            </thead>
            <tbody>
                <tr><td>Brown</td><td>#A52A2A</td><td><div id="brown"> </div></td><td>DeepSky</td><td>#00BFFF</td><td><div id="DeepSky"></div></td></tr>
                <tr><td>Blueviolet</td><td>#8A2BE2</td><td><div id="Blueviolet"></div></td><td>Gold</td><td>#FFD700</td><td><div id="Gold"></div></td></tr>
                <tr><td>DarkOrange</td><td>#FF8C00</td><td><div id="DarkOrange"></div></td><td>OliveDrab</td><td>#6B8E23</td><td><div id="OliveDrab"></div></td></tr>
            </tbody>
        </table>
    </body>
</html>
