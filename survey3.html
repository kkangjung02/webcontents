<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
    </head>
    <body>
        <header>
            <h3>설문지</h3>
            <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
            <hr>
        </header>
        <section>
            <article>
                학년 <label><input type="radio" name="grade" value="1"> 1학년</lable>
                    <label><input type="radio" name="grade" value="2"> 2학년</label>
                     <label><input type="radio" name="grade" value="3"> 3학년</label>
            </article><br>
            <article>
                성별 <label><input type="radio" name="gender" value="1"> 남</label>
                    <label><input type="radio" name="gender" value="2"> 여</label>
            </article><br>
            <article>
                <label>관심 분야 <select name="like">
                    <option value="1">모바일 소프트웨어</option>
                    <option value="2">프론트엔드</option>
                    <option value="3">게임</option>
                    <option value="4"selected>AI</option>
                </select></label>
            </article><br>
            <article>
                진로 <label><input type="checkbox" value="1"> 개발</label>
                <label><input type="checkbox" value="2"> 기획</label>
                <label><input type="checkbox" value="3"> 영업</label>
                <label><input type="checkbox" value="4"> 창업</label>
            </article>
            <article>
                남기고 싶은 말 <textarea cols="20" rows="8"> 글을 남겨주세요.</textarea>
            </article>
        </section>
